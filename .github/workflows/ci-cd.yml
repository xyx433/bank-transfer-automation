name: Bank Transfer CI/CD

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. 启动 MySQL 数据库服务
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 2. 拉取 Python 测试代码 (当前仓库)
      - name: Checkout Python Test Code
        uses: actions/checkout@v3

      # 3. 拉取 Java 后端代码 (跨仓库)
      - name: Checkout Java Backend Code
        uses: actions/checkout@v3
        with:
          repository: xyx433/bank-transfer-java
          path: java-backend
          token: ${{ secrets.JAVA_REPO_TOKEN }}

      # 4. 构建并运行 Java 后端 Docker 容器
      - name: Build and Run Backend
        run: |
          # 构建镜像
          docker build -t bank-backend ./java-backend
          
          # 运行容器 (关键：所有参数写在一行，使用 host 网络模式)
          docker run -d \
            --name my-bank-app \
            --network host \
            -e SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8 \
            -e SPRING_DATASOURCE_USERNAME=root \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            bank-backend

      # 5. 等待后端启动 (更稳健的等待方式)
      - name: Wait for Backend to Start
        run: |
          echo "Waiting for server on port 8080..."
          # 循环检查端口是否开放，最多等待 120 秒
          for i in $(seq 1 120); do
            nc -z localhost 8080 && echo "Server is UP!" && exit 0
            echo "Waiting... $i/120"
            sleep 5
          done
          echo "Server failed to start within 120s" && exit 1
        env:
          # 让 nc (netcat) 命令可用，用于检查端口
          DEBIAN_FRONTEND: noninteractive

      # 6. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 7. 安装 Python 依赖
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pymysql requests pytest

      # 8. 运行测试
      - name: Run Tests
        run: pytest testcases/ -v

      # 9. 清理
      - name: Cleanup
        if: always()
        run: |
          docker rm -f my-bank-app || true