name: Bank Transfer CI/CD

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Python Test Code
        uses: actions/checkout@v3

      - name: Checkout Java Backend Code
        uses: actions/checkout@v3
        with:
          repository: xyx433/bank-transfer-java
          path: java-backend
          token: ${{ secrets.JAVA_REPO_TOKEN }}

      # 构建并运行 Java 后端 Docker 容器
      - name: Build and Run Backend
        run: |
          docker build -t bank-backend ./java-backend
          sh -c '
          docker run -d \
            --name my-bank-app \
            --network host \
            -e "SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true" \
            -e "SPRING_DATASOURCE_USERNAME=root" \
            -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            bank-backend
          '

      - name: Wait for Backend to Start
        run: |
          echo "Waiting for server on port 8080..."
          sudo apt-get update && sudo apt-get install -y netcat-openbsd || true
          
          for i in $(seq 1 24); do
            if nc -z localhost 8080; then
              echo "Server is UP!"
              exit 0
            fi
            echo "Waiting... attempt $i/24 (sleeping 5s)"
            sleep 5
          done
          echo "Server failed to start within 120s"
          docker logs my-bank-app
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pymysql requests pytest allure-pytest

      - name: Initialize Test Database
        run: |
          mysql -h127.0.0.1 -uroot -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < sql/reset_test_accounts.sql

      - name: Run Tests with Allure
        run: pytest testcases/ -v --alluredir=allure-results

      # 【关键修改】这里将 v3 改为了 v4
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-results/

      - name: Cleanup
        if: always()
        run: |
          docker rm -f my-bank-app || true
