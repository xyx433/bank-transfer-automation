name: Bank Transfer CI/CD

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. 检出 Python 测试代码
      - name: Checkout Python Test Code
        uses: actions/checkout@v3

      # 2. 检出 Java 后端代码 (使用 token 访问私有仓库)
      - name: Checkout Java Backend Code
        uses: actions/checkout@v3
        with:
          repository: xyx433/bank-transfer-java
          path: java-backend
          token: ${{ secrets.JAVA_REPO_TOKEN }}

      # 3. 构建并运行 Java 后端 Docker 容器
      - name: Build and Run Backend
        run: |
          docker build -t bank-backend ./java-backend
          docker run -d \
            --name my-bank-app \
            --network host \
            -e "SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true" \
            -e "SPRING_DATASOURCE_USERNAME=root" \
            -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            bank-backend

      # 4. 等待后端完全启动 (包含健康检查)
      - name: Wait for Backend to Start
        run: |
          echo "Waiting for server on port 8080..."
          sudo apt-get update && sudo apt-get install -y netcat-openbsd || true

          for i in $(seq 1 30); do
            if nc -z localhost 8080; then
              echo "Server is UP!"
              exit 0
            fi
            echo "Waiting... attempt $i/30 (sleeping 5s)"
            sleep 5
          done
          echo "Server failed to start within 150s"
          docker logs my-bank-app
          exit 1

      # 5. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 6. 安装依赖
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pymysql requests pytest allure-pytest

      # 7. 【关键修改】初始化测试数据库 (必须在 Java 启动之后执行)
      - name: Initialize Test Database
        run: |
          echo "Importing test data after backend startup..."
          # 使用 127.0.0.1 强制 TCP 连接，避免 socket 路径问题
          mysql -h 127.0.0.1 -P 3306 -uroot -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < sql/reset_test_accounts.sql

      # 8. 运行测试
      - name: Run Tests with Allure
        run: pytest testcases/ -v --alluredir=allure-results

      # 9. 上传 Allure 报告
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-results/

      # 10. 清理资源
      - name: Cleanup
        if: always()
        run: |
          docker rm -f my-bank-app || true
