name: Bank Transfer CI/CD

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. 定义 MySQL 服务
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        # 等待 MySQL 就绪
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    # 2. 检出代码
    - name: Checkout Python Code
      uses: actions/checkout@v3

    - name: Checkout Java Backend
      uses: actions/checkout@v3
      with:
        repository: xyx433/bank-transfer-java
        path: java-backend
        token: ${{ secrets.JAVA_REPO_TOKEN }}

    # 3. 准备环境变量
    # 注意：这里我们使用 Docker 的 --add-host 或直接使用 host 网络，或者使用 services 的别名
    # 最稳妥的方式：Java 连 mysql (服务名)，Python 连 127.0.0.1
    # 但是为了统一，我们让 Java 也连 127.0.0.1 (因为用了 --network host)
    
    # 4. 构建并运行 Java 后端
    # 关键点：使用 --network host 让 Java 容器直接使用主机网络，这样 localhost 就能通
    - name: Build and Run Backend
      run: |
        docker build -t bank-backend ./java-backend
        docker run -d \
          --name my-bank-app \
          --network host \
          -e "VALIDATION_ENABLED=true" \
          -e "RISK_CONTROL_ENABLED=true" \
          -e "SECURITY_BYPASS_TOKEN=DEBUG_MODE" \
          -e "SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true" \
          -e "SPRING_DATASOURCE_USERNAME=root" \
          -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" \
          bank-backend
    # 5. 等待 Java 启动
    - name: Wait for Backend
      run: |
        sudo apt-get update && sudo apt-get install -y netcat-openbsd
        for i in $(seq 1 30); do
          if nc -z localhost 8080; then
            echo "Server Started!"
            exit 0
          fi
          sleep 5
        done
        echo "Server Start Timeout!"
        docker logs my-bank-app
        exit 1

    # 6. 设置 Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 7. 安装依赖
    - name: Install Python Dependencies
      run: |
        pip install pymysql requests pytest allure-pytest PyYAML

    # 8. 【关键】初始化数据库
    # 此时 Java 已经启动，表结构已经由 Java (JPA/Hibernate) 创建好了
    - name: Initialize Test Database
      run: |
        echo "Waiting 10 more seconds to ensure DB schema is created by Java..."
        sleep 10
        
        # 显式指定主机和端口
        mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < sql/reset_test_accounts.sql
        
        # 打印表结构用于调试
        mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} -e "SHOW TABLES;"

    # 9. 运行测试
    # 设置环境变量，告诉 Python 测试脚本连哪里
    - name: Run Tests
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: pytest testcases/ -v --alluredir=allure-results

    # 10. 报告与清理
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-results/

    - name: Cleanup
      if: always()
      run: |
        docker rm -f my-bank-app || true
