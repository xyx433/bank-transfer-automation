  - id: "TC_Transfer_036"
    name: "防重放-nonce时间戳偏差超过300秒"
    description: >
        nonce 格式为 {timestamp}_{randomString}，timestamp 与服务器时间
        偏差不得超过 ±300 秒。构造一个时间戳偏差 -400 秒的 nonce，
        验证后端返回 REPLAY_ATTACK（10008），提示时间戳异常。
        注：nonce 中的 timestamp 需在代码层面构造，YAML 无法直接生成过期时间戳；
        本用例需配合 Python 辅助函数 generate_expired_nonce() 使用，
        或在测试框架中支持 <time_offset:-400> 占位符。
    tags:
      - regression
      - negative
      - anti-replay
    note: >-
        完整环境分层校验顺序：收款账户有效性→付款账户状态→付款余额→单日限额→单笔限额→安全认证→风控规则；已完整初始化全量测试账户、银行行号、限额统计、黑名单数据，后端关闭自动删表初始化，数据持久稳定。
    overrides:
        header:
            channelId: "MB"
        body:
            transaction:
                amount: 100.00
                bizType: "1001"
            security:
                nonce: "<time_offset:-301>_replayed"
    expected:
        http_status: 200
        respCode: "10002"
        tranStatus: "FAILED"
        expectedFailReasonKeywords: ["单日累计", "限额"]
